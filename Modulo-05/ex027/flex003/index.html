<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexible Box</title>
  <style>
    div.conteiner { /* É o pai. */
      flex-direction: row-reverse; /* Se não colocar nada, este é o padrão, onde os elementos(Itens) serão postos da esquerda para a direita. */
      /* flex-direction: row-reverse; -> Os elementos(Itens) serão postos da direita para a esquerda. */
      /* flex-direction: column; -> Os elementos(Itens) serão postos de cima para baixo.*/
      /* flex-direction: column-reverse; -> Os elementos(Itens) serão empilhados de baixo para cima. */
      background-color: lightsalmon;
      display: flex; /* O "display: flex" tem que ser sempre no pai, que habilita o "flexbox" */
      flex-wrap: wrap-reverse;
    }
    div.item { /* É o filho. */
      background-color: lightskyblue;
      border: 1px solid black;
      text-align: center;
      /*flex: auto;*/ /* Distribui igualmente todos os itens dentro do conteiner pai. Esta sintaxe só é aceita no FILHO. */
    }
  </style>
</head>
<body>
  <div class="conteiner">
    <div class="item">Exemplo de bloco A</div>
    <div class="item">Exemplo de bloco B</div>
    <div class="item">Exemplo de bloco C</div>
    <div class="item">Exemplo de bloco D</div>
    <div class="item">Exemplo de bloco E</div>
    <div class="item">Exemplo de bloco F</div>
    <div class="item">Exemplo de bloco G</div>
  </div>
</body>
</html>
